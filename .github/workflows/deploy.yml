name: Deploy to GitHub Pages

# Both environments share one GitHub Pages site (a repo only ever has one):
#   main             -> site root      (production)
#   any other branch -> /staging/      (staging; last push to any non-main wins)
# Published to the `gh-pages` branch, so Pages must be configured to
# "Deploy from a branch -> gh-pages / (root)".
on:
  push:
    branches:
      - '**'
  workflow_dispatch:

# `contents: write` lets the action push the built site to `gh-pages`.
permissions:
  contents: write

# Scope concurrency per branch so a staging deploy never cancels a prod deploy.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Fetch COE data
        run: node scripts/fetch-coe-data.mjs
      - run: npm run build

      # Production: main -> site root.
      # keep_files preserves the sibling /staging folder from being wiped.
      - name: Deploy production (root)
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true

      # Staging: any non-main branch -> /staging subpath.
      # destination_dir scopes the publish/clean to /staging, leaving root prod intact.
      - name: Deploy staging (/staging)
        if: github.ref != 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: staging
